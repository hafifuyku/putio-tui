name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: hafifuyku/homebrew-putio-tui
          path: homebrew-tap
          token: ${{ secrets.PUTIO_TUI_AUTO_RELEASE }}

      - name: Update formula version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd homebrew-tap
          sed -i 's|url "https://github.com/hafifuyku/putio-tui.git".*|url "https://github.com/hafifuyku/putio-tui.git", tag: "v'"${VERSION}"'"|' Formula/putio-tui.rb
          sed -i 's/^  version .*/  version "'"${VERSION}"'"/' Formula/putio-tui.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/putio-tui.rb
          git diff --cached --quiet && exit 0
          git commit -m "Update putio-tui to v${VERSION}"
          git push
